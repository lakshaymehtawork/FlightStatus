<div class="app-shell">
  <header class="app-header">
    <h1 class="app-title">SkyRoute Flight Status</h1>
    <p class="app-subtitle">Look up real-time flight status from multiple providers.</p>
  </header>

  <main class="app-main">
    <app-search-form
      [isLoading]="isLoading()"
      (searchSubmitted)="search($event)"
    />

    @if (error()) {
      <div class="error-banner" role="alert" aria-live="assertive">
        <strong>Error:</strong> {{ error() }}
      </div>
    }

    @if (isLoading()) {
      <div class="loading-overlay" aria-live="polite" aria-label="Loading flight status">
        <span class="spinner" aria-hidden="true"></span>
        <span>Fetching flight status&hellip;</span>
      </div>
    }

    <app-status-result [result]="result()" />
  </main>

  <footer class="app-footer">
    <p>SkyRoute &mdash; Data from stub providers.</p>
  </footer>
</div>
