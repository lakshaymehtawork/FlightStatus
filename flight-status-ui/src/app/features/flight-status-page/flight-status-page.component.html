<div class="app-shell">
  <div class="atc-sky-layer" aria-hidden="true">
    <div class="radar-ring radar-ring--one"></div>
    <div class="radar-ring radar-ring--two"></div>
    <div class="flight-path flight-path--alpha"></div>
    <div class="flight-path flight-path--beta"></div>
  </div>

  <header class="app-header glass-panel">
    <div class="header-copy">
      <p class="eyebrow">Global Airspace Monitor</p>
      <h1 class="app-title">SkyRoute Flight Operations Dashboard</h1>
      <p class="app-subtitle">Look up real-time flight status from multiple providers.</p>
    </div>
    <div class="header-chip" aria-hidden="true">
      <span class="chip-dot"></span>
      Live Feed
    </div>
  </header>

  <main class="app-main">
    <section class="control-panel glass-panel">
      <app-search-form
        [isLoading]="isLoading()"
        (searchSubmitted)="search($event)"
      />
    </section>

    @if (error()) {
      <div class="error-banner" role="alert" aria-live="assertive">
        <strong>Error:</strong> {{ error() }}
      </div>
    }

    @if (isLoading()) {
      <div class="loading-overlay glass-panel" aria-live="polite" aria-label="Loading flight status">
        <span class="spinner" aria-hidden="true"></span>
        <span>Fetching flight status&hellip;</span>
      </div>
    }

    <app-status-result [result]="result()" />
  </main>

  <footer class="app-footer">
    <p>SkyRoute - Air Operations Data Hub</p>
  </footer>
</div>
